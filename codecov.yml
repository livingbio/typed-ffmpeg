# Align Cobertura paths (relative to packages/core) with repo layout for Codecov.
fixes:
  - "src/::packages/core/src/"

coverage:
  status:
    project:
      default:
        if_ci_failed: error
        only_pulls: true
        flags:
          - backend # Only use backend coverage for status checks
    patch:
      default:
        if_ci_failed: error
        only_pulls: true
        flags:
          - backend # Only use backend coverage for status checks

flags:
  backend:
    paths:
      - packages/core/src/ffmpeg_core
      - packages/v5/src/ffmpeg
      - packages/v6/src/ffmpeg
      - packages/v7/src/ffmpeg
      - packages/v8/src/ffmpeg
  typescript:
    paths:
      - packages/ts-core/src

comment:
  layout: 'reach, diff, flags, files'
  behavior: default
  require_changes: false
