repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # - id: check-added-large-files
      - id: check-case-conflict
        files: ^(src/|packages/)
      - id: check-json
        files: ^(src/|packages/)
        exclude: '__snapshots__/|.eslintrc.json|tsconfig.*\.json'
      - id: check-merge-conflict
        files: ^(src/|packages/)
      - id: check-yaml
        files: ^(src/|packages/)
      - id: end-of-file-fixer
        files: ^(src/|packages/)
        exclude: '__snapshots__/'
      - id: fix-encoding-pragma
        files: ^(src/|packages/)
        args: [--remove]
      - id: mixed-line-ending
        files: ^(src/|packages/)
      - id: trailing-whitespace
        files: ^(src/|packages/)
        args: [--markdown-linebreak-ext=md]
        exclude: '__snapshots__/'
      - id: pretty-format-json
        files: ^(src/|packages/)
        args: [--autofix]
        exclude: '__snapshots__/|.eslintrc.json|tsconfig.*\.json'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version - keep in sync with pyproject.toml and uv.lock
    rev: v0.12.2
    hooks:
      # Run the formatter.
      - id: ruff-format
        files: ^(src/|packages/)
        exclude: ^packages/v[5678]/src/ffmpeg/
      # Run the linter.
      - id: ruff
        args: [--fix, --unsafe-fixes]
        files: ^(src/|packages/)
        exclude: ^packages/v[5678]/src/ffmpeg/

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uvx ty check
        language: system
        types: [python]
        exclude: migrations/|commands/|sandbox/|samples|sdk
        files: ^(src/|packages/)
        pass_filenames: false
        # uvx: ty is not on PATH in CI; ignores align with known third-party / intentional patterns
        args:
          - 'src/'
          - 'packages/'
          - '--ignore'
          - 'unresolved-import'
          - '--ignore'
          - 'unresolved-attribute'
          - '--ignore'
          - 'unresolved-reference'
          - '--ignore'
          - 'missing-argument'
          - '--ignore'
          - 'invalid-return-type'
          - '--ignore'
          - 'unused-type-ignore-comment'
          - '--ignore'
          - 'ignore-comment-unknown-rule'
          - '--ignore'
          - 'invalid-argument-type'
          - '--ignore'
          - 'unsupported-operator'
          - '--ignore'
          - 'invalid-method-override'
          - '--ignore'
          - 'invalid-assignment'
          - '--ignore'
          - 'no-matching-overload'
          - '--ignore'
          - 'possibly-missing-submodule'
          - '--ignore'
          - 'too-many-positional-arguments'
          - '--ignore'
          - 'invalid-type-form'
