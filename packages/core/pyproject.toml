[project]
name = "ffmpeg-core"
version = "1.0.0a1"
description = "Core runtime for typed-ffmpeg (DAG, compilation, IR layer)"
authors = [
    {name = "lucemia", email = "lucemia@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = [
    "ffmpeg",
    "core",
    "runtime",
]
classifiers = [
    "Intended Audience :: Developers",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Video",
]

dependencies = []  # Pure Python, no dependencies

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "syrupy>=5.0",
    "ruff>=0.9.6",
    "mypy>=1.0",
]

graph = ["graphviz"]  # For visualization

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["ffmpeg_core*"]

[tool.setuptools.package-data]
"ffmpeg_core" = ["py.typed"]
"ffmpeg_core.common" = ["*"]
"ffmpeg_core.common.cache" = ["*"]
"ffmpeg_core.common.cache.list" = ["*"]

[tool.ruff]
line-length = 88
src = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
