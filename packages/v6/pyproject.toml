[project]
name = "typed-ffmpeg-v6"
version = "4.0.2"
description = "Typed FFmpeg bindings for FFmpeg 6.x"
authors = [
    {name = "lucemia", email = "lucemia@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = ["ffmpeg", "video", "audio", "multimedia", "filter", "ffmpeg-6"]
classifiers = [
    "Intended Audience :: Developers",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Topic :: Multimedia :: Video",
]

dependencies = ["ffmpeg-core>=4.0.2,<5.0"]

[tool.uv.sources]
ffmpeg-core = { workspace = true }
ffmpeg-data-v6 = { workspace = true }

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov>=4.0", "syrupy>=5.0", "ruff==0.12.2"]
parse = ["ffmpeg-data-v6"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["ffmpeg*"]

[tool.setuptools.package-data]
"ffmpeg" = ["py.typed"]
