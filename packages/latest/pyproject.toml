[project]
name = "typed-ffmpeg"
version = "4.0.1"
description = "Modern Python & TypeScript FFmpeg wrappers with comprehensive typing (latest version)"
authors = [
    {name = "lucemia", email = "lucemia@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = [
    "ffmpeg",
    "video",
    "audio",
    "multimedia",
    "filter",
    "typed",
]
classifiers = [
    "Intended Audience :: Developers",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Video",
    "Topic :: Multimedia :: Sound/Audio",
]

# Meta-package: no source code, just depends on typed-ffmpeg-v8
# which provides `import ffmpeg` directly.
dependencies = [
    "typed-ffmpeg-v8>=4.0.1,<5.0",
]

[tool.uv.sources]
typed-ffmpeg-v8 = { workspace = true }
ffmpeg-data-v8 = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff==0.12.2",
]
parse = ["ffmpeg-data-v8"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
