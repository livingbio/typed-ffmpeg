name: Ultra Debug

on:
  push:
    branches: [refactor/monorepo-architecture]
    paths:
      - '.github/workflows/ultra-debug.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Verbose Test
        run: |
          set -x  # Enable debug mode
          
          echo "Step 1: cd"
          cd packages/core || exit 1
          pwd
          
          echo "Step 2: create venv"
          python -m venv .venv || exit 2
          ls -la .venv/bin/
          
          echo "Step 3: activate venv"
          . .venv/bin/activate || exit 3
          which python
          python --version
          
          echo "Step 4: install package"
          pip install -e ".[dev]" || exit 4
          pip list | grep ffmpeg
          
          echo "Step 5: test import"
          python -c "import ffmpeg_core; print('Import OK')" || exit 5
          
          echo "Step 6: run pytest"
          pytest src/ --co -q || exit 6
          
          echo "Step 7: run actual tests"
          pytest src/ -v --maxfail=1 || exit 7
          
          echo "ALL STEPS PASSED!"
