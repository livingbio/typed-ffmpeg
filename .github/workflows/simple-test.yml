name: Simple Test

on:
  push:
    branches: [refactor/monorepo-architecture]
    paths:
      - '.github/workflows/simple-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Test in one command
        run: |
          cd packages/core && \
          python -m venv .venv && \
          . .venv/bin/activate && \
          pip install -q -e ".[dev]" && \
          pytest src/ -x -v 2>&1 | tee test_output.txt && \
          echo "=== EXIT CODE: $? ==="
        continue-on-error: true
      
      - name: Show any error
        if: always()
        run: |
          cd packages/core
          if [ -f test_output.txt ]; then
            echo "=== TEST OUTPUT ==="
            tail -100 test_output.txt
          fi
