name: CI TypeScript - Test

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'packages/ts-*/**'
      - 'src/scripts/code_gen/templates_ts/**'
      - 'src/scripts/code_gen/gen.py'
      - 'src/scripts/code_gen/cli.py'
      - '.github/workflows/ci-ts-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/ts-*/**'
      - 'src/scripts/code_gen/templates_ts/**'
      - 'src/scripts/code_gen/gen.py'
      - 'src/scripts/code_gen/cli.py'
      - '.github/workflows/ci-ts-test.yml'

jobs:
  test-ts-core:
    name: Test ts-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: packages/ts-core
        run: npm install

      - name: Type check
        working-directory: packages/ts-core
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: packages/ts-core
        run: npx vitest run --coverage

      - name: Fix lcov paths for monorepo
        run: sed -i 's|SF:src/|SF:packages/ts-core/src/|g' packages/ts-core/coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./packages/ts-core/coverage/lcov.info
          flags: typescript
          name: ts-core-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  typecheck-ts-versions:
    name: Type check ts-v${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build ts-core
        working-directory: packages/ts-core
        run: |
          npm install
          npx tsc

      - name: Install ts-v${{ matrix.version }} dependencies
        run: npm install

      - name: Type check ts-v${{ matrix.version }}
        working-directory: packages/ts-v${{ matrix.version }}
        run: npx tsc --noEmit
