name: CI CodeGen - Multi-Version FFmpeg

permissions:
  contents: read

on:
  push:
    branches: [main, v4]
    paths:
      - '.github/workflows/ci-codegen-versions.yml'
      - 'src/scripts/code_gen/**'
      - 'src/scripts/parse_help/**'
      - 'src/scripts/parse_c/**'
      - 'src/scripts/parse_docs/**'
      - 'src/scripts/manual/**'
      - 'packages/core/src/ffmpeg_core/common/**'
  pull_request:
    branches: [main, v4]
    paths:
      - '.github/workflows/ci-codegen-versions.yml'
      - 'src/scripts/code_gen/**'
      - 'src/scripts/parse_help/**'
      - 'src/scripts/parse_c/**'
      - 'src/scripts/parse_docs/**'
      - 'src/scripts/manual/**'
      - 'packages/core/src/ffmpeg_core/common/**'
  workflow_dispatch:
    inputs:
      ffmpeg-version:
        description: 'FFmpeg major version to generate (5, 6, 7, 8, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - '5'
          - '6'
          - '7'
          - '8'
          - 'all'

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ffmpeg-version: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.ffmpeg-version != 'all') && fromJSON(format('["{0}"]', github.event.inputs.ffmpeg-version)) || fromJSON('["5", "6", "7", "8"]') }}
        include:
          - ffmpeg-version: '5'
            ffmpeg-source-tag: 'n5.1.6'
            build-from-source: true
          - ffmpeg-version: '6'
            ffmpeg-source-tag: 'n6.1.2'
            build-from-source: true
          - ffmpeg-version: '7'
            ffmpeg-source-tag: 'n7.1'
            build-from-source: true
          - ffmpeg-version: '8'
            ffmpeg-source-tag: 'n8.1'
            build-from-source: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # ── All versions: build from source with full hardware-filter support ──────
      - name: Install build dependencies (source build)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential nasm yasm pkg-config git wget \
            libva-dev libdrm-dev \
            libvulkan-dev glslang-tools \
            ladspa-sdk \
            lv2-dev \
            ocl-icd-opencl-dev opencl-headers \
            libssl-dev zlib1g-dev \
            libx264-dev libx265-dev libvpx-dev \
            libfdk-aac-dev libmp3lame-dev libopus-dev libvorbis-dev \
            libfreetype6-dev libass-dev \
            libtheora-dev

      - name: Build FFmpeg ${{ matrix.ffmpeg-version }} from source
        run: |
          FFMPEG_TAG="${{ matrix.ffmpeg-source-tag }}"
          wget -q "https://github.com/FFmpeg/FFmpeg/archive/refs/tags/${FFMPEG_TAG}.tar.gz" -O /tmp/ffmpeg.tar.gz
          tar -xf /tmp/ffmpeg.tar.gz -C /tmp
          SRCDIR="/tmp/FFmpeg-${FFMPEG_TAG}"
          cd "$SRCDIR"
          ./configure \
            --prefix=/usr/local \
            --enable-gpl \
            --enable-nonfree \
            --enable-openssl \
            --enable-opencl \
            --enable-vaapi \
            --enable-vulkan \
            --enable-ladspa \
            --enable-lv2 \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libvpx \
            --enable-libfdk-aac \
            --enable-libmp3lame \
            --enable-libopus \
            --enable-libvorbis \
            --enable-libfreetype \
            --enable-libass \
            --enable-libtheora \
            --disable-debug \
            --disable-doc \
            --disable-htmlpages \
            --disable-manpages \
            --disable-podpages \
            --disable-txtpages
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          ffmpeg -version | head -1
          echo "--- Filters with hardware acceleration ---"
          ffmpeg -filters 2>/dev/null | grep -iE 'opencl|vulkan|vaapi|ladspa|lv2|cuda' || true

      - name: Install uv
        run: pip install uv

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv sync

      - name: Generate versioned bindings
        run: |
          source .venv/bin/activate
          export PYTHONPATH="$PWD/src:$PYTHONPATH"
          FFMPEG_MAJOR=${{ matrix.ffmpeg-version }}
          OUTPATH="packages/v${FFMPEG_MAJOR}/src/ffmpeg"
          echo "Generating bindings for FFmpeg v${FFMPEG_MAJOR} -> ${OUTPATH}"
          python -m scripts.code_gen.cli generate --outpath "$OUTPATH" --rebuild

      - name: Verify generated code imports
        run: |
          source .venv/bin/activate
          uv pip install -e packages/core -e "packages/v${{ matrix.ffmpeg-version }}[dev]"
          FFMPEG_MAJOR=${{ matrix.ffmpeg-version }}
          python -c "
          import ffmpeg
          from ffmpeg import filters, sources
          from ffmpeg.codecs import encoders, decoders
          from ffmpeg.formats import muxers, demuxers
          from ffmpeg.streams import audio, video
          print('All v${FFMPEG_MAJOR} submodules import OK')
          "

      - name: Show generated file stats
        run: |
          FFMPEG_MAJOR=${{ matrix.ffmpeg-version }}
          echo "## Generated files for v${FFMPEG_MAJOR}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find packages/v${FFMPEG_MAJOR}/src/ffmpeg/ -name '*.py' | head -20 >> $GITHUB_STEP_SUMMARY
          find packages/v${FFMPEG_MAJOR}/src/ffmpeg/ -name '*.py' -exec wc -l {} + 2>/dev/null | tail -1 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload generated bindings
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-v${{ matrix.ffmpeg-version }}-bindings
          path: packages/v${{ matrix.ffmpeg-version }}/src/ffmpeg/
          retention-days: 30

      - name: Upload version cache
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-v${{ matrix.ffmpeg-version }}-cache
          path: packages/core/src/ffmpeg_core/common/cache/list/*_${{ matrix.ffmpeg-version }}_*.json
          retention-days: 30
