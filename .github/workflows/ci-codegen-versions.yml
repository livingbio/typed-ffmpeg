name: CI CodeGen - Multi-Version FFmpeg

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'src/scripts/code_gen/**'
      - 'src/scripts/parse_help/**'
      - 'src/scripts/parse_c/**'
      - 'src/scripts/parse_docs/**'
      - 'src/scripts/manual/**'
      - 'src/ffmpeg/common/schema.py'
  pull_request:
    branches: [main]
    paths:
      - 'src/scripts/code_gen/**'
      - 'src/scripts/parse_help/**'
      - 'src/scripts/parse_c/**'
      - 'src/scripts/parse_docs/**'
      - 'src/scripts/manual/**'
      - 'src/ffmpeg/common/schema.py'
  workflow_dispatch:
    inputs:
      ffmpeg-version:
        description: 'FFmpeg major version to generate (5, 6, 7, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - '5'
          - '6'
          - '7'
          - 'all'

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ffmpeg-version: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.ffmpeg-version != 'all') && fromJSON(format('["{0}"]', github.event.inputs.ffmpeg-version)) || fromJSON('["5", "6", "7"]') }}
        include:
          - ffmpeg-version: '5'
            ffmpeg-image: 'jrottenberg/ffmpeg:5.1-ubuntu'
          - ffmpeg-version: '6'
            ffmpeg-image: 'jrottenberg/ffmpeg:6.1-ubuntu'
          - ffmpeg-version: '7'
            ffmpeg-image: 'jrottenberg/ffmpeg:7.1-ubuntu'

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Extract FFmpeg ${{ matrix.ffmpeg-version }} from Docker image
        run: |
          # Pull the Docker image and copy ffmpeg/ffprobe binaries + shared libs
          docker pull ${{ matrix.ffmpeg-image }}
          CONTAINER_ID=$(docker create ${{ matrix.ffmpeg-image }})
          # Copy binaries
          docker cp "$CONTAINER_ID:/usr/local/bin/ffmpeg" /usr/local/bin/ffmpeg || \
            docker cp "$CONTAINER_ID:/usr/bin/ffmpeg" /usr/local/bin/ffmpeg
          docker cp "$CONTAINER_ID:/usr/local/bin/ffprobe" /usr/local/bin/ffprobe || \
            docker cp "$CONTAINER_ID:/usr/bin/ffprobe" /usr/local/bin/ffprobe
          # Copy shared libraries needed by the binaries
          docker cp "$CONTAINER_ID:/usr/local/lib/." /usr/local/lib/ 2>/dev/null || true
          docker rm "$CONTAINER_ID"
          ldconfig
          ffmpeg -version | head -1

      - name: Install uv
        run: pip install uv

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install --group dev

      - name: Generate versioned bindings
        run: |
          source .venv/bin/activate
          FFMPEG_VERSION=$(ffmpeg -version 2>/dev/null | head -1 | grep -oP '\d+\.\d+')
          echo "Generating bindings for FFmpeg $FFMPEG_VERSION"
          python -m scripts.code_gen.cli generate --version-dir --rebuild

      - name: Verify generated code imports
        run: |
          source .venv/bin/activate
          FFMPEG_MAJOR=${{ matrix.ffmpeg-version }}
          python -c "
          from ffmpeg.v${FFMPEG_MAJOR} import filters, sources
          from ffmpeg.v${FFMPEG_MAJOR}.codecs import encoders, decoders
          from ffmpeg.v${FFMPEG_MAJOR}.formats import muxers, demuxers
          from ffmpeg.v${FFMPEG_MAJOR}.streams import audio, video
          print('All v${FFMPEG_MAJOR} submodules import OK')
          "

      - name: Show generated file stats
        run: |
          FFMPEG_MAJOR=${{ matrix.ffmpeg-version }}
          echo "## Generated files for v${FFMPEG_MAJOR}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find src/ffmpeg/v${FFMPEG_MAJOR}/ -name '*.py' | head -20 >> $GITHUB_STEP_SUMMARY
          wc -l src/ffmpeg/v${FFMPEG_MAJOR}/**/*.py 2>/dev/null | tail -1 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload generated bindings
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-v${{ matrix.ffmpeg-version }}-bindings
          path: src/ffmpeg/v${{ matrix.ffmpeg-version }}/
          retention-days: 30

      - name: Upload version cache
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-v${{ matrix.ffmpeg-version }}-cache
          path: src/ffmpeg/common/cache/list/*_${{ matrix.ffmpeg-version }}_*.json
          retention-days: 30
