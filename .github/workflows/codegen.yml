name: Codegen Package CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/codegen/**'
      - '.github/workflows/codegen.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/codegen/**'
      - '.github/workflows/codegen.yml'

defaults:
  run:
    working-directory: packages/codegen

jobs:
  test:
    name: Test Codegen Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
      
      - name: Run linting
        run: |
          ruff check src/
      
      - name: Run type checking
        run: |
          mypy src/
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=ffmpeg_codegen --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: codegen
          name: codegen-${{ matrix.os }}-${{ matrix.python-version }}

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      
      - name: Build package
        run: |
          uv pip install build
          python -m build
      
      - name: Check package
        run: |
          uv pip install twine
          twine check dist/*
