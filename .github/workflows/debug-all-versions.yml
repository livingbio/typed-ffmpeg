name: Debug All Python Versions

on:
  push:
    branches: [refactor/monorepo-architecture]
    paths:
      - '.github/workflows/debug-all-versions.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install and test
        run: |
          echo "=== Python version ==="
          python --version
          
          echo "=== Change to core directory ==="
          cd packages/core
          pwd
          
          echo "=== Create venv ==="
          python -m venv .venv
          ls -la .venv/
          
          echo "=== Activate venv ==="
          source .venv/bin/activate
          which python
          
          echo "=== Install package ==="
          pip install -e ".[dev]" || (echo "❌ Install failed" && exit 1)
          
          echo "=== List installed packages ==="
          pip list | grep -E "(ffmpeg|pytest|syrupy)"
          
          echo "=== Run pytest ==="
          pytest src/ --co -q | head -20
          
          echo "=== Run actual tests ==="
          pytest src/ -v --maxfail=3
