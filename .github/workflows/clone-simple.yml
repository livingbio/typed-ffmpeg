name: Clone Simple

on:
  push:
    branches: [refactor/monorepo-architecture]
    paths:
      - '.github/workflows/clone-simple.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Test (exact copy of working simple test)
        run: |
          cd packages/core && python -m venv .venv && . .venv/bin/activate && pip install -q -e ".[dev]" && pytest src/ -x -v
