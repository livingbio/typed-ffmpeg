name: CI Package - Lint

on:
  push:
    branches: [main]
    paths:
      - 'src/ffmpeg/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/ffmpeg/**'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run prek
        run: uvx prek run --all-files
