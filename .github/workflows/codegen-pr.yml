name: CodeGen - Regenerate Bindings

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate v${{ matrix.ffmpeg-version }} bindings
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ffmpeg-version: '5'
            ffmpeg-source-tag: 'n5.1.6'
          - ffmpeg-version: '6'
            ffmpeg-source-tag: 'n6.1.2'
          - ffmpeg-version: '7'
            ffmpeg-source-tag: 'n7.1'
          - ffmpeg-version: '8'
            ffmpeg-source-tag: 'n8.1'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── All versions: build from source with full hardware-filter support ──────
      - name: Install build dependencies (source build)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential nasm yasm pkg-config git wget \
            libva-dev libdrm-dev \
            libvulkan-dev glslang-tools shaderc \
            ladspa-sdk libladspa-ocaml-dev \
            lv2-dev \
            liblilv-dev \
            ocl-icd-opencl-dev opencl-headers \
            libssl-dev zlib1g-dev \
            libx264-dev libx265-dev libvpx-dev \
            libfdk-aac-dev libmp3lame-dev libopus-dev libvorbis-dev \
            libfreetype6-dev libass-dev \
            libtheora-dev

      - name: Build FFmpeg ${{ matrix.ffmpeg-version }} from source
        run: |
          FFMPEG_TAG="${{ matrix.ffmpeg-source-tag }}"
          wget -q "https://github.com/FFmpeg/FFmpeg/archive/refs/tags/${FFMPEG_TAG}.tar.gz" -O /tmp/ffmpeg.tar.gz
          tar -xf /tmp/ffmpeg.tar.gz -C /tmp
          SRCDIR="/tmp/FFmpeg-${FFMPEG_TAG}"
          cd "$SRCDIR"
          ./configure \
            --prefix=/usr/local \
            --enable-gpl \
            --enable-nonfree \
            --enable-openssl \
            --enable-opencl \
            --enable-vaapi \
            --enable-vulkan \
            --enable-ladspa \
            --enable-lv2 \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libvpx \
            --enable-libfdk-aac \
            --enable-libmp3lame \
            --enable-libopus \
            --enable-libvorbis \
            --enable-libfreetype \
            --enable-libass \
            --enable-libtheora \
            --disable-debug \
            --disable-doc \
            --disable-htmlpages \
            --disable-manpages \
            --disable-podpages \
            --disable-txtpages
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          ffmpeg -version | head -1
          echo "--- Filters containing 'opencl', 'vulkan', 'vaapi', 'ladspa', 'lv2', 'cuda' ---"
          ffmpeg -filters 2>/dev/null | grep -iE 'opencl|vulkan|vaapi|ladspa|lv2|cuda' || true

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Generate bindings
        run: |
          source .venv/bin/activate
          export PYTHONPATH="$PWD/src:$PYTHONPATH"
          python -m scripts.code_gen.cli generate \
            --outpath "packages/v${{ matrix.ffmpeg-version }}/src/ffmpeg" \
            --ffmpeg-binary /usr/local/bin/ffmpeg \
            --rebuild

      - name: Upload generated bindings
        uses: actions/upload-artifact@v4
        with:
          name: bindings-v${{ matrix.ffmpeg-version }}
          path: packages/v${{ matrix.ffmpeg-version }}/src/ffmpeg/
          retention-days: 1

      - name: Upload version cache
        uses: actions/upload-artifact@v4
        with:
          name: cache-v${{ matrix.ffmpeg-version }}
          path: packages/core/src/ffmpeg_core/common/cache/list/
          retention-days: 1

  create-pr:
    name: Create PR
    needs: generate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v4

      - name: Download all generated bindings
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-v*
          path: /tmp/bindings

      - name: Download all version caches
        uses: actions/download-artifact@v4
        with:
          pattern: cache-v*
          path: /tmp/caches

      - name: Apply generated files
        run: |
          for V in 5 6 7 8; do
            if [ -d "/tmp/bindings/bindings-v${V}" ]; then
              echo "Applying v${V} bindings..."
              rsync -a --delete "/tmp/bindings/bindings-v${V}/" "packages/v${V}/src/ffmpeg/"
            fi
            if [ -d "/tmp/caches/cache-v${V}" ]; then
              echo "Applying v${V} cache..."
              rsync -a "/tmp/caches/cache-v${V}/" "packages/core/src/ffmpeg_core/common/cache/list/"
            fi
          done

      - name: Check for changes
        id: changes
        run: |
          git diff --stat
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and PR
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="chore/regenerate-bindings-$(date +%Y%m%d%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packages/v5/src/ffmpeg/ packages/v6/src/ffmpeg/ packages/v7/src/ffmpeg/ packages/v8/src/ffmpeg/
          git add packages/core/src/ffmpeg_core/common/cache/list/
          git commit -m "chore: regenerate bindings for FFmpeg v5/v6/v7/v8"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: regenerate bindings for FFmpeg v5/v6/v7/v8" \
            --body "Auto-generated by the [CodeGen workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

All versions built from source with \`--enable-opencl\`, \`--enable-vulkan\`, \`--enable-vaapi\`, \`--enable-ladspa\`, and \`--enable-lv2\` so that hardware-accelerated filters (blend_vulkan, hstack_vaapi, ladspa, lv2, overlay_opencl, etc.) appear in \`ffmpeg -filters\` output and are included in the generated bindings." \
            --base v4 \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes detected — bindings are already up to date."
