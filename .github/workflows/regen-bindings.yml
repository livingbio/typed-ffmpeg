name: Regenerate FFmpeg Bindings

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/regen-bindings.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (skip creating PR)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  generate:
    name: Generate v${{ matrix.ffmpeg-version }} bindings
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # v5/v6: normal jrottenberg builds
          - ffmpeg-version: '5'
            ffmpeg-image: 'jrottenberg/ffmpeg:5.1-ubuntu'
          - ffmpeg-version: '6'
            ffmpeg-image: 'jrottenberg/ffmpeg:6.1-ubuntu'
          # v7/v8: full builds (no --enable-small, descriptions preserved)
          - ffmpeg-version: '7'
            ffmpeg-image: 'ghcr.io/livingbio/typed-ffmpeg/ffmpeg:7.1'
          - ffmpeg-version: '8'
            ffmpeg-image: 'ghcr.io/livingbio/typed-ffmpeg/ffmpeg:8.0'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Extract FFmpeg ${{ matrix.ffmpeg-version }} from Docker image
        run: |
          docker pull ${{ matrix.ffmpeg-image }}
          # Copy binaries
          CONTAINER_ID=$(docker create ${{ matrix.ffmpeg-image }})
          sudo docker cp "$CONTAINER_ID:/usr/local/bin/ffmpeg" /usr/local/bin/ffmpeg || \
            sudo docker cp "$CONTAINER_ID:/usr/bin/ffmpeg" /usr/local/bin/ffmpeg
          sudo docker cp "$CONTAINER_ID:/usr/local/bin/ffprobe" /usr/local/bin/ffprobe || \
            sudo docker cp "$CONTAINER_ID:/usr/bin/ffprobe" /usr/local/bin/ffprobe
          # Copy all libraries from the container (both /usr/local/lib and system libs)
          docker cp "$CONTAINER_ID:/usr/local/lib" /tmp/ffmpeg-libs
          sudo cp -a /tmp/ffmpeg-libs/. /usr/local/lib/
          docker cp "$CONTAINER_ID:/usr/lib" /tmp/sys-libs
          sudo cp -an /tmp/sys-libs/. /usr/lib/
          docker rm "$CONTAINER_ID"
          sudo ldconfig
          ffmpeg -version | head -1
          echo "--- Filters with hardware acceleration ---"
          ffmpeg -filters 2>/dev/null | grep -iE 'opencl|vulkan|vaapi|ladspa|lv2|cuda' || true

      - name: Install build tools and FFmpeg runtime dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            nasm yasm build-essential \
            libvulkan1 \
            libbs2b0 librubberband2 libmysofa1 liblilv-0-0 \
            frei0r-plugins
          sudo apt-get install -y --no-install-recommends \
            libplacebo-dev libshaderc-dev flite1-dev 2>/dev/null || true

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Generate bindings
        run: |
          source .venv/bin/activate
          export PYTHONPATH="$PWD/src:$PYTHONPATH"
          python -m scripts.code_gen.cli generate \
            --outpath "packages/v${{ matrix.ffmpeg-version }}/src/ffmpeg" \
            --ffmpeg-binary /usr/local/bin/ffmpeg \
            --rebuild

      - name: Upload generated bindings
        uses: actions/upload-artifact@v4
        with:
          name: bindings-v${{ matrix.ffmpeg-version }}
          path: packages/v${{ matrix.ffmpeg-version }}/src/ffmpeg/
          retention-days: 1

      - name: Upload version cache
        uses: actions/upload-artifact@v4
        with:
          name: cache-v${{ matrix.ffmpeg-version }}
          path: packages/core/src/ffmpeg_core/common/cache/list/
          retention-days: 1

  create-pr:
    name: Create PR
    needs: generate
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v4

      - name: Download all generated bindings
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-v*
          path: /tmp/bindings

      - name: Download all version caches
        uses: actions/download-artifact@v4
        with:
          pattern: cache-v*
          path: /tmp/caches

      - name: Apply generated files
        run: |
          for V in 5 6 7 8; do
            if [ -d "/tmp/bindings/bindings-v${V}" ]; then
              echo "Applying v${V} bindings..."
              rsync -a --delete "/tmp/bindings/bindings-v${V}/" "packages/v${V}/src/ffmpeg/"
            fi
            if [ -d "/tmp/caches/cache-v${V}" ]; then
              echo "Applying v${V} cache..."
              rsync -a "/tmp/caches/cache-v${V}/" "packages/core/src/ffmpeg_core/common/cache/list/"
            fi
          done

      - name: Check for changes
        id: changes
        run: |
          git diff --stat
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and PR
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="chore/regenerate-bindings-$(date +%Y%m%d%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -f packages/v5/src/ffmpeg/ packages/v6/src/ffmpeg/ packages/v7/src/ffmpeg/ packages/v8/src/ffmpeg/
          git add -f packages/core/src/ffmpeg_core/common/cache/list/
          git commit -m "chore: regenerate bindings for FFmpeg v5/v6/v7/v8"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: regenerate bindings for FFmpeg v5/v6/v7/v8" \
            --body "Auto-generated by the [Regen workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}). Uses jrottenberg/ffmpeg images for v5/v6 and custom full-build images for v7/v8." \
            --base v4 \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes detected — bindings are already up to date."
