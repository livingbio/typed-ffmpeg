name: Minimal Matrix

on:
  push:
    branches: [refactor/monorepo-architecture]
    paths:
      - '.github/workflows/minimal-matrix.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']  # Just one version first
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Test
        run: |
          cd packages/core && python -m venv .venv && source .venv/bin/activate && pip install -e ".[dev]" && pytest src/ -v
