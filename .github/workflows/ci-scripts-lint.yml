name: CI Scripts - Lint

permissions:
  contents: read

on:
  push:
    branches: [main, v4]
    paths:
      - 'src/scripts/**'
      - '.pre-commit-config.yaml'
      - '.github/workflows/ci-scripts-lint.yml'
  pull_request:
    branches: [main, v4]
    paths:
      - 'src/scripts/**'
      - '.pre-commit-config.yaml'
      - '.github/workflows/ci-scripts-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run prek
        run: uvx prek run --all-files
