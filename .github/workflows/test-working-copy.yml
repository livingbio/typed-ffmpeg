name: Test Working Copy

on:
  push:
    branches: [refactor/monorepo-architecture]
    paths:
      - 'packages/core/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Test core package
        run: |
          cd packages/core
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
          pytest src/ -v
