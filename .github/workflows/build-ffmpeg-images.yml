name: Build FFmpeg Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/ffmpeg-builder/Dockerfile.*'
      - '.github/workflows/build-ffmpeg-images.yml'
  workflow_dispatch:
    inputs:
      ffmpeg-version:
        description: 'FFmpeg image tag to build (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - '7.1'
          - '8.0'
          - 'all'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ffmpeg-version: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.ffmpeg-version != 'all') && fromJSON(format('["{0}"]', github.event.inputs.ffmpeg-version)) || fromJSON('["7.1", "8.0"]') }}
        include:
          - ffmpeg-version: '7.1'
            ffmpeg-source-version: '7.1.1'
          - ffmpeg-version: '8.0'
            ffmpeg-source-version: '8.0'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push FFmpeg ${{ matrix.ffmpeg-version }}
        uses: docker/build-push-action@v6
        with:
          context: docker/ffmpeg-builder
          file: docker/ffmpeg-builder/Dockerfile.${{ matrix.ffmpeg-version }}
          push: true
          platforms: linux/amd64
          build-args: |
            FFMPEG_SOURCE_VERSION=${{ matrix.ffmpeg-source-version }}
          tags: |
            ghcr.io/${{ github.repository }}/ffmpeg:${{ matrix.ffmpeg-version }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/ffmpeg:${{ matrix.ffmpeg-version }}-cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/ffmpeg:${{ matrix.ffmpeg-version }}-cache,mode=max

      - name: Verify image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/ffmpeg:${{ matrix.ffmpeg-version }}
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" -version 2>&1 | head -2
          echo ""
          echo "=== All filters ==="
          docker run --rm "$IMAGE" -filters 2>/dev/null | tail -n +9
          echo ""
          echo "=== Filter count ==="
          docker run --rm "$IMAGE" -filters 2>/dev/null | grep -c '^\s' || true
          echo ""
          echo "=== Hardware acceleration filters ==="
          docker run --rm "$IMAGE" -filters 2>/dev/null | grep -iE 'vaapi|opencl|vulkan|cuda' || echo "(none found)"
          echo ""
          echo "=== Plugin filters (frei0r, ladspa, lv2) ==="
          docker run --rm "$IMAGE" -filters 2>/dev/null | grep -iE 'frei0r|ladspa|lv2' || echo "(none found)"
          echo ""
          echo "=== Audio filters (bs2b, rubberband, sofalizer, flite) ==="
          docker run --rm "$IMAGE" -filters 2>/dev/null | grep -iE 'bs2b|rubberband|sofalizer' || echo "(none found)"
          echo ""
          echo "=== Muxer descriptions ==="
          docker run --rm "$IMAGE" -muxers 2>&1 | grep "3g2"
