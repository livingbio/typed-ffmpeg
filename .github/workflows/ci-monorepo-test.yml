name: CI Monorepo - Test

on:
  push:
    branches: [main, refactor/monorepo-architecture]
    paths:
      - 'packages/**'
      - 'pyproject-workspace.toml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'pyproject-workspace.toml'

jobs:
  test-core:
    name: Test Core Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and test core package
        run: |
          cd packages/core
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
          pytest src/ -v

  test-v8:
    name: Test V8 Package
    runs-on: ubuntu-latest
    needs: test-core

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install packages and run tests
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e packages/core
          pip install -e packages/v8[dev]
          cd packages/v8
          pytest tests/ -v -k "not test_view"

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-core, test-v8]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Test imports and build
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e packages/core
          pip install -e packages/v8
          python -c "
          import ffmpeg
          inp = ffmpeg.input('test.mp4')
          out = inp.hflip().output(filename='out.mp4')
          print('✅ Import and basic workflow OK')
          "

      - name: Test packages are buildable
        run: |
          source .venv/bin/activate
          pip install build
          for pkg in core v8 v7 v6 v5; do
            echo "Building packages/$pkg..."
            python -m build packages/$pkg
          done
