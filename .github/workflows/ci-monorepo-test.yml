name: CI Monorepo - Test

on:
  push:
    branches: [main, refactor/monorepo-architecture]
    paths:
      - 'packages/**'
      - 'pyproject.toml'
      - 'pyproject-workspace.toml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'pyproject.toml'
      - 'pyproject-workspace.toml'

jobs:
  test-core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install and test core package
        run: |
          cd packages/core
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
          pytest src/ -v

  test-versions:
    runs-on: ubuntu-latest
    needs: test-core
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            ffmpeg-version: v5
          - python-version: '3.10'
            ffmpeg-version: v6
          - python-version: '3.10'
            ffmpeg-version: v7
          - python-version: '3.10'
            ffmpeg-version: v8
          - python-version: '3.12'
            ffmpeg-version: v8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install packages and run shared tests
        env:
          TYPED_FFMPEG_VERSION: ${{ matrix.ffmpeg-version }}
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e packages/core
          pip install -e "packages/${{ matrix.ffmpeg-version }}[dev]"
          pytest packages/tests-shared -v -k "not test_view"

  test-integration:
    runs-on: ubuntu-latest
    needs: [test-core, test-versions]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Test imports and build
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e packages/core
          pip install -e packages/v8
          python -c "
          import ffmpeg
          inp = ffmpeg.input('test.mp4')
          out = inp.hflip().output(filename='out.mp4')
          print('✅ Import and basic workflow OK')
          "

      - name: Test packages are buildable
        run: |
          source .venv/bin/activate
          pip install build
          for pkg in core v8 v7 v6 v5; do
            echo "Building packages/$pkg..."
            python -m build packages/$pkg
          done
