name: CI Monorepo - Test

on:
  push:
    branches: [main, refactor/monorepo-architecture]
    paths:
      - 'packages/**'
      - 'pyproject.toml'
      - 'pyproject-workspace.toml'
      - '.github/workflows/ci-monorepo-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'pyproject.toml'
      - 'pyproject-workspace.toml'
      - '.github/workflows/ci-monorepo-test.yml'

jobs:
  test-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install core package
        run: |
          cd packages/core
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          cd packages/core
          source .venv/bin/activate
          pytest src/ -v \
            --cov=ffmpeg_core \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: packages/core/coverage.xml
          flags: backend,python,${{ matrix.python-version }},ffmpeg-core
          name: backend-core-py${{ matrix.python-version }}
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Coverage summary (job summary)
        if: matrix.python-version == '3.12'
        run: |
          cd packages/core
          source .venv/bin/activate
          echo "## Coverage (ffmpeg_core)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-core-py${{ matrix.python-version }}
          path: |
            packages/core/coverage.xml
            packages/core/htmlcov/

  test-versions:
    runs-on: ubuntu-latest
    needs: test-core
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            ffmpeg-version: v5
          - python-version: '3.10'
            ffmpeg-version: v6
          - python-version: '3.10'
            ffmpeg-version: v7
          - python-version: '3.10'
            ffmpeg-version: v8
          - python-version: '3.12'
            ffmpeg-version: v8

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install packages and run shared tests
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e packages/core
          pip install -e "packages/${{ matrix.ffmpeg-version }}[dev,parse]"
          pytest packages/tests-shared -v -k "not test_view and not test_parse_ffmpeg_commands" \
            --cov=ffmpeg \
            --cov=ffmpeg_core \
            --cov-report=xml:coverage-bindings.xml

      - name: Upload bindings coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage-bindings.xml
          flags: backend,python,${{ matrix.python-version }},bindings-${{ matrix.ffmpeg-version }}
          name: backend-bindings-${{ matrix.ffmpeg-version }}-py${{ matrix.python-version }}
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  test-integration:
    runs-on: ubuntu-latest
    needs: [test-core, test-versions]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Test imports and build
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e packages/core
          pip install -e packages/v8
          python -c "
          import ffmpeg
          inp = ffmpeg.input('test.mp4')
          out = inp.hflip().output(filename='out.mp4')
          print('✅ Import and basic workflow OK')
          "

      - name: Test typed-ffmpeg meta-package
        run: |
          source .venv/bin/activate
          # Latest is a pure meta-package (no source code). Install non-editable
          # with --no-deps since v8 is already installed as editable.
          pip install --no-deps packages/latest
          python -c "
          import ffmpeg
          assert hasattr(ffmpeg, 'input'), 'missing ffmpeg.input'
          assert hasattr(ffmpeg, 'output'), 'missing ffmpeg.output'
          assert hasattr(ffmpeg, 'probe'), 'missing ffmpeg.probe'
          assert hasattr(ffmpeg, 'VideoStream'), 'missing ffmpeg.VideoStream'
          assert hasattr(ffmpeg, 'AudioStream'), 'missing ffmpeg.AudioStream'
          assert hasattr(ffmpeg, 'filters'), 'missing ffmpeg.filters'
          assert hasattr(ffmpeg, 'sources'), 'missing ffmpeg.sources'
          assert hasattr(ffmpeg, 'get_codecs'), 'missing ffmpeg.get_codecs'
          inp = ffmpeg.input('test.mp4')
          out = inp.hflip().output(filename='out.mp4')
          print('✅ typed-ffmpeg meta-package OK')
          "

      - name: Test packages are buildable
        run: |
          source .venv/bin/activate
          pip install build
          for pkg in core v8 v7 v6 v5 latest; do
            echo "Building packages/$pkg..."
            python -m build packages/$pkg
          done
