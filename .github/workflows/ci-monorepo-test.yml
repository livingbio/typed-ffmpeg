name: CI Monorepo - Test

on:
  push:
    branches: [main, refactor/monorepo-architecture]
    paths:
      - 'packages/**'
      - 'pyproject-workspace.toml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'pyproject-workspace.toml'

permissions:
  contents: read

jobs:
  test-core:
    name: Test Core Package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core package with dev dependencies
        working-directory: packages/core
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/core
        run: |
          source .venv/bin/activate
          pytest src/ -v --cov=./src --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./packages/core/coverage.xml
          flags: core,python-${{ matrix.python-version }}
          name: core-py${{ matrix.python-version }}
        continue-on-error: true

  test-v8:
    name: Test V8 Package
    runs-on: ubuntu-latest
    needs: test-core
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install packages
        run: |
          python -m venv .venv
          source .venv/bin/activate
          # Install core first
          pip install -e packages/core
          # Install v8 with dev dependencies
          pip install -e packages/v8[dev]

      - name: Run tests
        working-directory: packages/v8
        run: |
          source ../.venv/bin/activate
          pytest tests/ -v -k "not test_view" --cov=./src --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./packages/v8/coverage.xml
          flags: v8,python-${{ matrix.python-version }}
          name: v8-py${{ matrix.python-version }}
        continue-on-error: true

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-core, test-v8]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install packages
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e packages/core
          pip install -e packages/v8

      - name: Test import from v8
        run: |
          source .venv/bin/activate
          python -c "
          import ffmpeg
          inp = ffmpeg.input('test.mp4')
          out = inp.hflip().output(filename='out.mp4')
          print('✅ Import and basic workflow OK')
          "

      - name: Test packages are buildable
        run: |
          source .venv/bin/activate
          pip install build
          # Test each package can be built
          for pkg in core v8 v7 v6 v5; do
            echo "Building packages/$pkg..."
            python -m build packages/$pkg
          done
