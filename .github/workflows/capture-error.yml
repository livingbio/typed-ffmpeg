name: Capture Error

on:
  push:
    branches: [refactor/monorepo-architecture]
    paths:
      - '.github/workflows/capture-error.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Run test and capture all output
        continue-on-error: true
        run: |
          set -x
          cd packages/core
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]" 2>&1 | tee install.log
          pytest src/ -v 2>&1 | tee test.log
          echo "Exit code: $?" | tee -a test.log
      
      - name: Show install log
        if: always()
        run: |
          echo "=== INSTALL LOG ==="
          cat packages/core/install.log || echo "No install log"
      
      - name: Show test log  
        if: always()
        run: |
          echo "=== TEST LOG (last 100 lines) ==="
          tail -100 packages/core/test.log || echo "No test log"
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            packages/core/install.log
            packages/core/test.log
