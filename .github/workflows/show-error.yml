name: Show Error

on:
  push:
    branches: [refactor/monorepo-architecture]
    paths:
      - '.github/workflows/show-error.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Test and show errors
        run: |
          cd packages/core
          
          echo "=== Creating venv ==="
          python -m venv .venv
          
          echo "=== Activating venv ==="
          source .venv/bin/activate
          
          echo "=== Installing package ==="
          if ! pip install -e ".[dev]" 2>&1; then
            echo "❌ INSTALL FAILED"
            exit 1
          fi
          echo "✅ Install successful"
          
          echo "=== Running tests ==="
          if ! pytest src/ -v --tb=short 2>&1 | tee test_output.txt; then
            echo ""
            echo "❌ ❌ ❌ TESTS FAILED ❌ ❌ ❌"
            echo ""
            echo "=== LAST 50 LINES OF OUTPUT ==="
            tail -50 test_output.txt
            echo ""
            echo "=== FIRST FAILURE ==="
            grep -A 10 "FAILED" test_output.txt | head -20 || echo "No FAILED marker found"
            exit 1
          fi
          echo "✅ Tests passed"
