# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "uv" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "all"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/packages/ts-core"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/packages/ts-v5"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/packages/ts-v6"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/packages/ts-v7"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/packages/ts-v8"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/packages/playground"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/examples/typescript-demo"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/" # Typically GitHub Actions workflows are located in .github/workflows
    schedule:
      interval: "weekly"
  - package-ecosystem: "devcontainers"
    directory: "/" # Typically Dev Container configuration is located in .devcontainer
    schedule:
      interval: "weekly"
